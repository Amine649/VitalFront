<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>VITALFEED - Nutrition Vétérinaire Premium pour Chiens et Chats</title>
  <meta name="description" content="VITALFEED propose des solutions nutritionnelles premium pour chiens et chats. Découvrez nos aliments vétérinaires, compléments alimentaires et tests rapides recommandés par les professionnels.">
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <!-- Referrer Policy for Privacy -->
  <meta name="referrer" content="strict-origin-when-cross-origin">
  
  <link rel="icon" type="image/png" href="assets/images/Logo2.webp">
  <link rel="shortcut icon" href="data:,">
  
  <!-- Critical CSS - Inlined for faster initial render -->
  <style>
    /* Critical base styles - Using system fonts */
    * {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica', 'Arial', sans-serif;
    }
    
    body {
      background-color: #F5F1E8;
      color: #1f2937;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica', 'Arial', sans-serif;
      margin: 0;
    }
    
    html {
      overflow-x: hidden;
    }
    
    h1, h2, h3, h4, h5, h6 {
      font-weight: 600;
      color: #42636E;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica', 'Arial', sans-serif;
    }
    
    button {
      transition: all 0.3s;
    }
    
    /* Loading animation */
    @keyframes spin { 
      to { transform: rotate(360deg); } 
    }
  </style>
  
  <!-- Preload LCP image -->
  <link rel="preload" href="assets/images/Loading.webp" as="image" type="image/webp" fetchpriority="high">
  
  <!-- Preload hero image for home page -->
  <link rel="preload" href="assets/images/catDog2.webp" as="image" type="image/webp" fetchpriority="high">
</head>
<body>
  <app-root>
    <!-- Loading splash shown while Angular bootstraps -->
    <div style="
      position: fixed;
      inset: 0;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    ">
      <img src="assets/images/Loading.webp" alt="VITALFEED" style="width: 550px; height: 412px; margin-bottom: 4px;" loading="eager" fetchpriority="high">
      <div style="
        width: 30px;
        height: 25px;
        border: 3px solid #e5e7eb;
        border-top-color: #42636E;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      "></div>
      <style>
        @keyframes spin { to { transform: rotate(360deg); } }
      </style>
    </div>
  </app-root>
</body>
</html>
