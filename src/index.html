<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>VITALFEED</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="assets/images/Logo2.png">
  <link rel="shortcut icon" href="data:,">
  <!-- PDF.js Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
  <app-root>
    <!-- Loading splash shown while Angular bootstraps -->
    <div style="
      position: fixed;
      inset: 0;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    ">
      <img src="assets/images/Loading.jpg" alt="VITALFEED" style="width: 550px; height: auto; margin-bottom: 4px;" />
      <div style="
        width: 40px;
        height: 40px;
        border: 3px solid #e5e7eb;
        border-top-color: #42636E;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      "></div>
      <style>
        @keyframes spin { to { transform: rotate(360deg); } }
      </style>
    </div>
  </app-root>
</body>
</html>
