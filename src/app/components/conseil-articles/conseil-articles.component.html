<div class="min-h-screen flex flex-col bg-white relative">
  <!-- Background Image - Fixed at Top -->
  <div class="absolute top-0 left-0 right-0 z-0 pointer-events-none" style="height: 650px;">
    <img 
      src="assets/images/Nutrition.png" 
      alt="Background" 
      class="w-full h-full object-cover object-top"
    />
  </div>

  <!-- Article Content -->
  <div class="flex-grow w-full relative z-10 flex flex-col items-center">

    <!-- Static Article Content -->
    <article *ngIf="article && !isBlogPdf" class="w-full" style="margin-top: 29rem; padding: 2rem 1rem 2rem 10rem; max-width: 1400px;">
      
      <!-- Back Button - aligned left with article content -->
      <div class="mb-6 flex justify-start">
        <button 
          (click)="goBack()" 
          class="flex items-center gap-2 px-6 py-2.5 rounded-full font-semibold text-white transition-all duration-300 hover:shadow-lg transform hover:-translate-y-1"
          [ngClass]="article.animal === 'chat' ? 'bg-green-500 hover:bg-green-600' : 'bg-pink-500 hover:bg-pink-600'"
        >
          <svg class="w-5 h-5 transform group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
          </svg>
          Retour
        </button>
      </div>

      <!-- Category Badge -->
      <div class="mb-3">
        <span 
          class="inline-block px-3 py-1 rounded-full text-xs font-semibold"
          [ngClass]="article.animal === 'chat' ? 'bg-green-100 text-green-700' : 'bg-pink-100 text-pink-700'"
        >
          {{ article.category }}
        </span>
      </div>

      <!-- Article Title -->
      <h1 class="text-2xl md:text-3xl font-bold text-gray-900 mb-4 leading-tight">
        {{ article.title }}
      </h1>

      <!-- Divider -->
      <div class="w-16 h-1 mb-6" [ngClass]="article.animal === 'chat' ? 'bg-green-500' : 'bg-pink-500'"></div>

      <!-- Article Content -->
      <div 
        class="prose prose-base max-w-none text-justify article-content"
        [innerHTML]="article.content"
      ></div>

      <!-- Back to Articles Button -->
      <div class="mt-8 pt-6 border-t border-gray-200 flex justify-center">
        <button 
          (click)="goBack()" 
          class="px-6 py-2.5 rounded-full font-semibold text-white transition-all duration-300 hover:shadow-lg transform hover:-translate-y-1"
          [ngClass]="article.animal === 'chat' ? 'bg-green-500 hover:bg-green-600' : 'bg-pink-500 hover:bg-pink-600'"
        >
          Retour aux articles
        </button>
      </div>
    </article>

    <!-- Blog PDF Content -->
    <article *ngIf="isBlogPdf && blogPdfData" class="w-full" style="margin-top: 29rem; padding: 2rem 1rem 2rem 10rem; max-width: 1400px;">
      
      <!-- Back Button -->
      <div class="mb-6 flex justify-start">
        <button 
          (click)="goBack()" 
          class="flex items-center gap-2 px-6 py-2.5 rounded-full font-semibold text-white transition-all duration-300 hover:shadow-lg transform hover:-translate-y-1"
          [ngClass]="blogPdfData.animal === 'chat' ? 'bg-green-500 hover:bg-green-600' : 'bg-pink-500 hover:bg-pink-600'"
        >
          <svg class="w-5 h-5 transform group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
          </svg>
          Retour
        </button>
      </div>

      <!-- Category Badge -->
      <div class="mb-3">
        <span 
          class="inline-block px-3 py-1 rounded-full text-xs font-semibold"
          [ngClass]="blogPdfData.animal === 'chat' ? 'bg-green-100 text-green-700' : 'bg-pink-100 text-pink-700'"
        >
          {{ blogPdfData.category }}
        </span>
      </div>

      <!-- Article Title -->
      <h1 class="text-2xl md:text-3xl font-bold text-gray-900 mb-4 leading-tight">
        {{ blogPdfData.title }}
      </h1>

      <!-- Divider -->
      <div class="w-16 h-1 mb-6" [ngClass]="blogPdfData.animal === 'chat' ? 'bg-green-500' : 'bg-pink-500'"></div>

      <!-- Loading Spinner -->
      <div *ngIf="isPdfLoading" class="flex justify-center items-center py-20">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4"
             [ngStyle]="{'border-color': blogPdfData.animal === 'chat' ? 'rgb(116,195,117)' : 'rgb(160,24,103)'}">
        </div>
        <p class="ml-4 text-gray-600">Chargement du PDF...</p>
      </div>

      <!-- PDF Viewer -->
      <div *ngIf="pdfBlobUrl" class="w-full bg-white">
        <!-- PDF Canvas Container -->
        <div id="pdf-container" class="w-full min-h-screen"></div>
      </div>

      <!-- Back to Articles Button -->
      <div class="mt-8 pt-6 border-t border-gray-200 flex justify-center">
        <button 
          (click)="goBack()" 
          class="px-6 py-2.5 rounded-full font-semibold text-white transition-all duration-300 hover:shadow-lg transform hover:-translate-y-1"
          [ngClass]="blogPdfData.animal === 'chat' ? 'bg-green-500 hover:bg-green-600' : 'bg-pink-500 hover:bg-pink-600'"
        >
          Retour aux articles
        </button>
      </div>
    </article>
  </div>
</div>
