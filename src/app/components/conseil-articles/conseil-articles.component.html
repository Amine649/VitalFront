<div class="min-h-screen flex flex-col bg-white relative">
  <!-- Background Image - Fixed at Top -->
  <div class="absolute top-0 left-0 right-0 z-0 pointer-events-none hero-bg-container">
    <img src="assets/images/Nutrition.webp" 
      alt="Background" 
      class="hero-bg-img"
      style="width: 100%; object-fit: cover; object-position: top;" loading="lazy">
  </div>

  <!-- Article Content -->
  <div class="flex-grow w-full relative z-10 flex flex-col items-center">

    <!-- Static Article Content -->
    <article *ngIf="article && !isBlogPdf" class="w-full article-wrapper" style="max-width: 1400px;">
      
      <!-- Back Button - aligned left with article content -->
      <div style="margin-bottom: 24px;" class="flex justify-start">
        <button 
          (click)="goBack()" 
          style="padding: 10px 24px; border-radius: 9999px; font-weight: 600;"
          class="flex items-center gap-2 text-white transition-all duration-300 hover:shadow-lg transform hover:-translate-y-1"
          [ngClass]="article.animal === 'chat' ? 'bg-green-500 hover:bg-green-600' : 'bg-pink-500 hover:bg-pink-600'"
        >
          <svg style="width: 20px; height: 20px;" class="transform group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
          </svg>
          Retour
        </button>
      </div>

      <!-- Category Badge -->
      <div style="margin-bottom: 12px;">
        <span 
          style="padding: 4px 12px; border-radius: 9999px; font-size: 12px; font-weight: 600;"
          class="inline-block"
          [ngClass]="article.animal === 'chat' ? 'bg-green-100 text-green-700' : 'bg-pink-100 text-pink-700'"
        >
          {{ article.category }}
        </span>
      </div>

      <!-- Article Title -->
      <h1 class="article-title text-gray-900">
        {{ article.title }}
      </h1>

      <!-- Divider -->
      <div style="width: 64px; height: 4px; margin-bottom: 24px;" [ngClass]="article.animal === 'chat' ? 'bg-green-500' : 'bg-pink-500'"></div>

      <!-- Article Content -->
      <div 
        class="prose prose-base max-w-none text-justify article-content"
        [innerHTML]="article.content"
      ></div>

      <!-- Back to Articles Button -->
      <div style="margin-top: 32px; padding-top: 24px;" class="border-t border-gray-200 flex justify-center">
        <button 
          (click)="goBack()" 
          style="padding: 10px 24px; border-radius: 9999px; font-weight: 600;"
          class="text-white transition-all duration-300 hover:shadow-lg transform hover:-translate-y-1"
          [ngClass]="article.animal === 'chat' ? 'bg-green-500 hover:bg-green-600' : 'bg-pink-500 hover:bg-pink-600'"
        >
          Retour aux articles
        </button>
      </div>
    </article>

    <!-- Blog PDF Content -->
    <article *ngIf="isBlogPdf && blogPdfData" class="w-full article-wrapper" style="max-width: 1400px;">
      
      <!-- Back Button -->
      <div style="margin-bottom: 24px;" class="flex justify-start">
        <button 
          (click)="goBack()" 
          style="padding: 10px 24px; border-radius: 9999px; font-weight: 600;"
          class="flex items-center gap-2 text-white transition-all duration-300 hover:shadow-lg transform hover:-translate-y-1"
          [ngClass]="blogPdfData.animal === 'chat' ? 'bg-green-500 hover:bg-green-600' : 'bg-pink-500 hover:bg-pink-600'"
        >
          <svg style="width: 20px; height: 20px;" class="transform group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
          </svg>
          Retour
        </button>
      </div>

      <!-- Category Badge -->
      <div style="margin-bottom: 12px;">
        <span 
          style="padding: 4px 12px; border-radius: 9999px; font-size: 12px; font-weight: 600;"
          class="inline-block"
          [ngClass]="blogPdfData.animal === 'chat' ? 'bg-green-100 text-green-700' : 'bg-pink-100 text-pink-700'"
        >
          {{ blogPdfData.category }}
        </span>
      </div>

      <!-- Article Title -->
      <h1 class="article-title text-gray-900">
        {{ blogPdfData.title }}
      </h1>

      <!-- Divider -->
      <div style="width: 64px; height: 4px; margin-bottom: 24px;" [ngClass]="blogPdfData.animal === 'chat' ? 'bg-green-500' : 'bg-pink-500'"></div>

      <!-- Loading Spinner -->
      <div *ngIf="isPdfLoading" style="padding: 80px 0;" class="flex justify-center items-center">
        <div style="width: 64px; height: 64px; border-width: 4px;" class="animate-spin rounded-full border-t-4 border-b-4"
             [ngStyle]="{'border-color': blogPdfData.animal === 'chat' ? 'rgb(116,195,117)' : 'rgb(160,24,103)'}">
        </div>
        <p style="margin-left: 16px;" class="text-gray-600">Chargement du PDF...</p>
      </div>

      <!-- PDF Viewer -->
      <div *ngIf="pdfBlobUrl" style="width: 100%;" class="bg-white">
        <!-- PDF Canvas Container -->
        <div id="pdf-container" style="width: 100%; min-height: 100vh;"></div>
      </div>

      <!-- Back to Articles Button -->
      <div style="margin-top: 32px; padding-top: 24px;" class="border-t border-gray-200 flex justify-center">
        <button 
          (click)="goBack()" 
          style="padding: 10px 24px; border-radius: 9999px; font-weight: 600;"
          class="text-white transition-all duration-300 hover:shadow-lg transform hover:-translate-y-1"
          [ngClass]="blogPdfData.animal === 'chat' ? 'bg-green-500 hover:bg-green-600' : 'bg-pink-500 hover:bg-pink-600'"
        >
          Retour aux articles
        </button>
      </div>
    </article>
  </div>
</div>
